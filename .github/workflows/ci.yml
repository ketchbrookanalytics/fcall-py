name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "Run Tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, '[skip tests]') && !contains(github.event.pull_request.title, '[skip tests]')"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install uv
          uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest
